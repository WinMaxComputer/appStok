<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>Offline - Swamerta</title>
  <style>
    :root {
      --bg: #f4f8f7;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --brand: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top right, #d8f3ee 0, var(--bg) 45%);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid #dbe3e7;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Koneksi Internet Terputus</h1>
    <p>Aplikasi tidak dapat memuat data terbaru saat offline. Silakan cek koneksi internet lalu coba lagi.</p>
    <div class="actions">
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </main>
</body>
</html>
